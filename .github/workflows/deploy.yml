name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deploy; queue further runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        # Custom domain (talaria.castignoli.it) serves from root, so we use
        # Vite's default base of '/'. If you ever switch to a project-page
        # URL (marcocastignoli.github.io/talaria/), set VITE_BASE_URL=/talaria/
        # here and `public/CNAME` can be removed.
        run: npm run build

      - name: SPA fallback
        # GitHub Pages serves 404.html for unknown paths. Copy index.html so
        # client-side routes (e.g. /talaria/chain/1/address/0x…) survive a
        # hard reload.
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
